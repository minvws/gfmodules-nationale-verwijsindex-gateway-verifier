services:
  app:
    build:
      context: .
      args:
        NEW_UID: ${NEW_UID:-1000}
        NEW_GID: ${NEW_GID:-1000}
      dockerfile: docker/Dockerfile
    environment:
      FASTAPI_CONFIG_PATH: /src/app.conf
    volumes:
      - ./:/src
      - ./secrets:/src/secrets
    ports:
      - 8503:8503
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8502/health"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 5s
